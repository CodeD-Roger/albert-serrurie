name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

# Un seul déploiement à la fois ; on annule un déploiement en cours si un nouveau push arrive
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Garde-fou : on ne déploie jamais un build vide/cassé
      - name: Verify build output
        run: test -f dist/index.html || { echo "::error::dist/index.html introuvable — build invalide, déploiement annulé"; exit 1; }

      # Déploiement FTPS chiffré via lftp.
      # Hostinger présente un certificat mutualisé *.hstgr.io qui ne matche ni l'IP ni le domaine :
      # on garde le chiffrement (ssl-force) mais on désactive la vérification du nom (verify-certificate no).
      - name: Deploy via FTPS (lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
            set ssl:verify-certificate no;
            set ftp:ssl-force yes;
            set ftp:ssl-protect-data yes;
            set net:max-retries 3;
            set net:timeout 20;
            set cmd:fail-exit yes;
            open -u '$FTP_USERNAME','$FTP_PASSWORD' '$FTP_SERVER';
            mirror -R --delete --parallel=4 --verbose dist/ /;
            bye;
          "
